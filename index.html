<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Retornos — Cezar</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
:root[data-theme="dark"]{--bg:#0b0d12;--bg2:#13161e;--bg3:#1a1e2a;--border:#1e2338;--text:#e4e8f4;--text2:#6e7a9a;--text3:#343d5a;--accent:#4f8ef7;--green:#1fd48a;--yellow:#f5a623;--red:#f05252;--purple:#7b61ff;--sh:0 2px 16px rgba(0,0,0,.4);}
:root[data-theme="light"]{--bg:#f0f2f9;--bg2:#fff;--bg3:#f5f6fc;--border:#e0e4f0;--text:#0f1120;--text2:#5a6280;--text3:#9aa0c0;--accent:#3a7af4;--green:#0ea86e;--yellow:#c98a00;--red:#dc3535;--purple:#6a50f0;--sh:0 2px 12px rgba(0,0,0,.07);}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

header{padding:16px 28px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.logo{font-family:'Syne',sans-serif;font-weight:800;font-size:17px;display:flex;align-items:center;gap:8px;}
.ldot{width:7px;height:7px;border-radius:50%;background:var(--accent);box-shadow:0 0 8px var(--accent);animation:bl 2s infinite;}
@keyframes bl{0%,100%{opacity:1;}50%{opacity:.3;}}
.hright{display:flex;align-items:center;gap:10px;}
#lupd{font-size:11px;color:var(--text3);}
.gbtn{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:7px 13px;color:var(--text2);font-size:12px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;display:flex;align-items:center;gap:5px;transition:all .2s;}
.gbtn:hover{color:var(--text);}
.pbtn{background:var(--accent);border:none;border-radius:8px;padding:7px 15px;color:#fff;font-size:12px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;display:flex;align-items:center;gap:5px;transition:all .2s;}
.pbtn:hover{opacity:.85;}
.pbtn.busy{opacity:.6;pointer-events:none;}
.sp{display:inline-block;width:11px;height:11px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:rot .6s linear infinite;}
@keyframes rot{to{transform:rotate(360deg);}}

main{padding:24px 28px;max-width:1400px;margin:0 auto;}

/* VIEW TOGGLE */
.vtrow{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
.vtrow h2{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;}
.vtog{display:flex;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:3px;gap:2px;}
.vtbtn{padding:6px 14px;border-radius:6px;border:none;background:transparent;color:var(--text2);font-size:12px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s;}
.vtbtn.active{background:var(--bg3);color:var(--text);}

/* CARDS */
.cgrid{display:grid;grid-template-columns:repeat(6,1fr);gap:12px;margin-bottom:20px;}
.mcard{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:14px 16px;box-shadow:var(--sh);border-top:2px solid transparent;animation:fu .35s ease forwards;opacity:0;}
.mcard:nth-child(1){animation-delay:.05s;border-top-color:var(--accent);}
.mcard:nth-child(2){animation-delay:.08s;border-top-color:var(--green);}
.mcard:nth-child(3){animation-delay:.11s;border-top-color:var(--yellow);}
.mcard:nth-child(4){animation-delay:.14s;border-top-color:var(--purple);}
.mcard:nth-child(5){animation-delay:.17s;border-top-color:var(--green);}
.mcard:nth-child(6){animation-delay:.2s;border-top-color:var(--red);}
@keyframes fu{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.clbl{font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text3);margin-bottom:6px;}
.cval{font-family:'Syne',sans-serif;font-size:26px;font-weight:800;letter-spacing:-1px;line-height:1;}

/* TOOLBAR */
.toolbar{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap;}
.fsearch{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:8px 14px;color:var(--text);font-size:12px;font-family:'DM Sans',sans-serif;outline:none;transition:border .2s;width:220px;}
.fsearch:focus{border-color:var(--accent);}
.fsearch::placeholder{color:var(--text3);}
.fsel{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:8px 12px;color:var(--text);font-size:12px;font-family:'DM Sans',sans-serif;outline:none;cursor:pointer;}
.tlbl{font-size:11px;color:var(--text3);margin-left:auto;}

/* TABELA */
.tbox{background:var(--bg2);border:1px solid var(--border);border-radius:12px;overflow:hidden;box-shadow:var(--sh);animation:fu .35s .15s ease forwards;opacity:0;}
table{width:100%;border-collapse:collapse;}
thead th{padding:9px 14px;text-align:left;font-size:9px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--text3);background:var(--bg3);border-bottom:1px solid var(--border);}
tbody tr{border-bottom:1px solid var(--border);transition:background .15s;}
tbody tr:last-child{border-bottom:none;}
tbody tr:hover{background:var(--bg3);}
tbody td{padding:11px 14px;font-size:12px;vertical-align:middle;}
.tn{font-weight:500;font-size:13px;}
.td2{color:var(--text2);font-size:11px;margin-top:1px;}
.pill{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:100px;font-size:10px;font-weight:600;}

/* KANBAN */
.kboard{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;animation:fu .35s .15s ease forwards;opacity:0;}
.kcol{background:var(--bg2);border:1px solid var(--border);border-radius:12px;overflow:hidden;}
.khead{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.ktitle{font-size:12px;font-weight:600;}
.kcnt{background:var(--bg3);border-radius:100px;padding:2px 8px;font-size:10px;color:var(--text2);}
.kbody{padding:10px;max-height:420px;overflow-y:auto;}
.kcard{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px 12px;margin-bottom:8px;}
.kcard:last-child{margin-bottom:0;}
.kname{font-size:12px;font-weight:500;}
.kphone{font-size:10px;color:var(--text2);margin-top:2px;}
.kdate{font-size:10px;color:var(--text3);margin-top:3px;}
.kempty{padding:20px;text-align:center;color:var(--text3);font-size:11px;}

.empty{padding:40px 20px;text-align:center;color:var(--text3);font-size:12px;}
.ld{padding:40px 20px;text-align:center;color:var(--text3);}
.lsp{width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:rot .6s linear infinite;margin:0 auto 10px;display:block;}
.errbox{background:rgba(240,82,82,.08);border:1px solid rgba(240,82,82,.2);border-radius:10px;padding:12px 16px;color:var(--red);font-size:12px;margin-bottom:16px;display:none;}

@media(max-width:1100px){.cgrid{grid-template-columns:repeat(3,1fr);}}
@media(max-width:700px){.cgrid{grid-template-columns:repeat(2,1fr);}.kboard{grid-template-columns:1fr;}main{padding:14px;}}
</style>
</head>
<body>

<header>
  <div class="logo"><div class="ldot"></div>Cezar · Retornos</div>
  <div class="hright">
    <span id="lupd"></span>
    <button class="gbtn" onclick="toggleTheme()"><span id="tico">☀️</span><span id="ttxt">Modo claro</span></button>
    <button class="pbtn" id="rbtn" onclick="loadData()">↻ Atualizar</button>
  </div>
</header>

<main>
  <div class="errbox" id="errbox"></div>

  <!-- CARDS -->
  <div class="cgrid">
    <div class="mcard"><div class="clbl">Mensagem</div><div class="cval" style="color:var(--accent)" id="c-msg">—</div></div>
    <div class="mcard"><div class="clbl">Clicou no Link</div><div class="cval" style="color:var(--green)" id="c-cli">—</div></div>
    <div class="mcard"><div class="clbl">Baixando Agora</div><div class="cval" style="color:var(--yellow)" id="c-bnd">—</div></div>
    <div class="mcard"><div class="clbl">Baixou o App</div><div class="cval" style="color:var(--purple)" id="c-bxu">—</div></div>
    <div class="mcard"><div class="clbl">Confirmou</div><div class="cval" style="color:var(--green)" id="c-con">—</div></div>
    <div class="mcard"><div class="clbl">Bloqueou</div><div class="cval" style="color:var(--red)" id="c-blk">—</div></div>
  </div>

  <!-- TOGGLE + TOOLBAR -->
  <div class="vtrow">
    <div style="font-size:13px;color:var(--text2)" id="totalLbl"></div>
    <div class="vtog">
      <button class="vtbtn active" id="vt-cards" onclick="setView('cards')">▦ Cards</button>
      <button class="vtbtn" id="vt-kanban" onclick="setView('kanban')">⊞ Kanban</button>
    </div>
  </div>

  <div class="toolbar">
    <input class="fsearch" id="srch" type="text" placeholder="Buscar nome ou telefone..." oninput="render()">
    <select class="fsel" id="fTag" onchange="render()">
      <option value="">Todas as etapas</option>
      <option value="mensagem">mensagem</option>
      <option value="clicou no link">clicou no link</option>
      <option value="baixando agora">baixando agora</option>
      <option value="baixou o app">baixou o app</option>
      <option value="confirmou">confirmou</option>
      <option value="bloqueou">bloqueou</option>
    </select>
    <span class="tlbl" id="tlbl"></span>
  </div>

  <!-- CARDS VIEW -->
  <div id="vw-cards">
    <div class="tbox">
      <div id="tblLeads"><div class="ld"><span class="lsp"></span>Carregando...</div></div>
    </div>
  </div>

  <!-- KANBAN VIEW -->
  <div id="vw-kanban" style="display:none;">
    <div class="kboard" id="kboard"></div>
  </div>
</main>

<script>
const SB='https://vdloxobxrtfitbsuwzyw.supabase.co';
const SK='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZkbG94b2J4cnRmaXRic3V3enl3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgxNjc3MDIsImV4cCI6MjA5Mzc0MzcwMn0._tvrQCE_tPLhUqf1afVmBFJO75hSMzMFujmwmC6fg8c';

// TEMA
const saved=localStorage.getItem('theme')||'dark';
document.documentElement.setAttribute('data-theme',saved);
if(saved==='light'){document.getElementById('tico').textContent='🌙';document.getElementById('ttxt').textContent='Modo escuro';}
function toggleTheme(){
  const d=document.documentElement.getAttribute('data-theme')==='dark';
  document.documentElement.setAttribute('data-theme',d?'light':'dark');
  document.getElementById('tico').textContent=d?'🌙':'☀️';
  document.getElementById('ttxt').textContent=d?'Modo escuro':'Modo claro';
  localStorage.setItem('theme',d?'light':'dark');
}

// ESTADO
let leadsData=[];

// VIEW
let view=localStorage.getItem('view')||'cards';
function setView(v){
  view=v;localStorage.setItem('view',v);
  document.getElementById('vt-cards').classList.toggle('active',v==='cards');
  document.getElementById('vt-kanban').classList.toggle('active',v==='kanban');
  document.getElementById('vw-cards').style.display=v==='cards'?'block':'none';
  document.getElementById('vw-kanban').style.display=v==='kanban'?'block':'none';
  render();
}
setView(view);

const fdt=d=>{if(!d)return'—';const s=d.endsWith('Z')||d.includes('+')?d:d+'Z';return new Date(s).toLocaleString('pt-BR',{timeZone:'America/Sao_Paulo',day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'});};

function tagBg(t){
  if(!t)return'background:var(--bg3);color:var(--text2)';
  const n=t.toLowerCase();
  if(n==='mensagem')return'background:rgba(79,142,247,.12);color:var(--accent)';
  if(n==='clicou no link')return'background:rgba(31,212,138,.12);color:var(--green)';
  if(n==='baixando agora')return'background:rgba(245,166,35,.12);color:var(--yellow)';
  if(n==='baixou o app')return'background:rgba(123,97,255,.12);color:var(--purple)';
  if(n==='confirmou')return'background:rgba(31,212,138,.15);color:var(--green)';
  if(n==='bloqueou')return'background:rgba(240,82,82,.12);color:var(--red)';
  return'background:var(--bg3);color:var(--text2)';
}
function tagColor(t){
  if(!t)return'var(--text2)';const n=t.toLowerCase();
  if(n==='mensagem')return'var(--accent)';
  if(n==='clicou no link')return'var(--green)';
  if(n==='baixando agora')return'var(--yellow)';
  if(n==='baixou o app')return'var(--purple)';
  if(n==='confirmou')return'var(--green)';
  if(n==='bloqueou')return'var(--red)';
  return'var(--text2)';
}

// FETCH COM PAGINAÇÃO COMPLETA
async function fetchAll(table,params=''){
  let all=[];let from=0;const size=1000;
  while(true){
    const r=await fetch(`${SB}/rest/v1/${table}?${params}&limit=${size}&offset=${from}`,{
      headers:{apikey:SK,Authorization:`Bearer ${SK}`}
    });
    if(!r.ok)throw new Error(`HTTP ${r.status} — ${table}`);
    const data=await r.json();
    if(!Array.isArray(data)||data.length===0)break;
    all=[...all,...data];
    if(data.length<size)break;
    from+=size;
  }
  return all;
}

// DEDUPLICAR — pega última tag por telefone
function dedup(data){
  const m={};
  data.forEach(d=>{
    const k=d.lead_phone||d.lead_id||d.id;
    if(!m[k]||new Date(d.criado_em)>new Date(m[k].criado_em))m[k]=d;
  });
  return Object.values(m);
}

async function loadData(){
  const btn=document.getElementById('rbtn');
  btn.classList.add('busy');btn.innerHTML='<span class="sp"></span> Atualizando';
  document.getElementById('errbox').style.display='none';
  try{
    leadsData=await fetchAll('eventos_leads','order=criado_em.desc');
    renderCards();
    render();
    document.getElementById('lupd').textContent=
      new Date().toLocaleTimeString('pt-BR',{timeZone:'America/Sao_Paulo',hour:'2-digit',minute:'2-digit'});
  }catch(e){
    const b=document.getElementById('errbox');b.style.display='block';
    b.textContent=`Erro: ${e.message}`;
  }
  btn.classList.remove('busy');btn.innerHTML='↻ Atualizar';
}

function renderCards(){
  const d=dedup(leadsData);
  const c=tag=>d.filter(x=>(x.tag_name||'').toLowerCase()===tag).length;
  document.getElementById('c-msg').textContent=c('mensagem');
  document.getElementById('c-cli').textContent=c('clicou no link');
  document.getElementById('c-bnd').textContent=c('baixando agora');
  document.getElementById('c-bxu').textContent=c('baixou o app');
  document.getElementById('c-con').textContent=c('confirmou');
  document.getElementById('c-blk').textContent=c('bloqueou');
}

function getFiltered(){
  const q=document.getElementById('srch').value.toLowerCase().trim();
  const tag=document.getElementById('fTag').value.toLowerCase();
  let data=dedup(leadsData);
  if(tag)data=data.filter(d=>(d.tag_name||'').toLowerCase()===tag);
  if(q)data=data.filter(d=>(d.lead_name||'').toLowerCase().includes(q)||(d.lead_phone||'').includes(q));
  return data;
}

function render(){
  const data=getFiltered();
  document.getElementById('tlbl').textContent=`${data.length} lead${data.length!==1?'s':''}`;
  if(view==='kanban'){renderKanban(data);}else{renderTable(data);}
}

function renderTable(data){
  if(!data.length){document.getElementById('tblLeads').innerHTML='<div class="empty">Nenhum lead encontrado</div>';return;}
  document.getElementById('tblLeads').innerHTML=`<div style="overflow-x:auto"><table>
    <thead><tr><th>#</th><th>Nome</th><th>Telefone</th><th>Etapa</th><th>Fluxo</th><th>Última interação</th></tr></thead>
    <tbody>${data.map((d,i)=>`<tr>
      <td style="color:var(--text3);font-size:11px;width:40px">${i+1}</td>
      <td><div class="tn">${d.lead_name||'—'}</div></td>
      <td><div class="td2">${d.lead_phone||'—'}</div></td>
      <td><span class="pill" style="${tagBg(d.tag_name)}">${d.tag_name||'—'}</span></td>
      <td style="font-size:12px;color:var(--text2)">${d.fluxo||'—'}</td>
      <td style="font-size:11px;color:var(--text3)">${fdt(d.criado_em)}</td>
    </tr>`).join('')}</tbody>
  </table></div>`;
}

const TAGS=['mensagem','clicou no link','baixando agora','baixou o app','confirmou','bloqueou'];
function renderKanban(data){
  document.getElementById('kboard').innerHTML=TAGS.map(tag=>{
    const leads=data.filter(d=>(d.tag_name||'').toLowerCase()===tag);
    const color=tagColor(tag);
    return`<div class="kcol">
      <div class="khead">
        <span class="ktitle" style="color:${color}">${tag}</span>
        <span class="kcnt">${leads.length}</span>
      </div>
      <div class="kbody">${leads.length?leads.map(d=>`
        <div class="kcard">
          <div class="kname">${d.lead_name||'—'}</div>
          <div class="kphone">${d.lead_phone||''}</div>
          <div class="kdate">${fdt(d.criado_em)}</div>
        </div>`).join(''):'<div class="kempty">nenhum lead</div>'}
      </div>
    </div>`;
  }).join('');
}

loadData();
setInterval(loadData,60000);
</script>
</body>
</html>
